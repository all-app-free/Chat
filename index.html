<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luvyx Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
            authDomain: "luvyxchat.firebaseapp.com",
            projectId: "luvyxchat",
            storageBucket: "luvyxchat.firebasestorage.app",
            messagingSenderId: "311815294233",
            appId: "1:311815294233:web:4d6cb198ba2d1068314988",
            measurementId: "G-Z17TLX3PP0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeChatId = null; 
        let unsubMessages = null;
        let unsubUsers = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById('profile-name-input').value = data.name || user.displayName;
                        document.getElementById('my-avatar').src = data.photo || user.photoURL;
                    } else {
                        setDoc(userRef, { name: user.displayName, photo: user.photoURL, uid: user.uid }, { merge: true });
                    }
                });

                loadAllUsers();
            } else {
                // RESET PŘI ODHLÁŠENÍ
                currentUser = null;
                activeChatId = null;
                if (unsubMessages) unsubMessages();
                if (unsubUsers) unsubUsers();
                document.getElementById('auth-ui').style.display = 'flex';
                document.getElementById('chat-ui').style.display = 'none';
                document.getElementById('box').innerHTML = ""; 
                document.getElementById('chat-subtitle').innerText = "Vyberte kontakt v menu";
            }
        });

        const getChatId = (uid1, uid2) => [uid1, uid2].sort().join("_");

        function loadAllUsers() {
            unsubUsers = onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    if(u.uid === currentUser?.uid) return;
                    
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.onclick = () => startChat(u);
                    div.innerHTML = `
                        <img src="${u.photo || 'https://via.placeholder.com/40'}" class="user-img">
                        <span>${u.name}</span>
                    `;
                    list.appendChild(div);
                });
            });
        }

        window.updateNickname = async () => {
            const newName = document.getElementById('profile-name-input').value.trim();
            if (currentUser && newName !== "") {
                await updateDoc(doc(db, "users", currentUser.uid), { name: newName });
                alert("Přezdívka uložena!");
            }
        };

        window.startChat = (targetUser) => {
            activeChatId = getChatId(currentUser.uid, targetUser.uid);
            document.getElementById('chat-subtitle').innerText = "Chat s: " + targetUser.name;
            toggleMenu();
            loadMessages(activeChatId);
        };

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if (currentUser && activeChatId && input.value.trim() !== "") {
                await addDoc(collection(db, "chats", activeChatId, "messages"), {
                    text: input.value,
                    sender: currentUser.uid,
                    time: serverTimestamp()
                });
                input.value = "";
            }
        };

        function loadMessages(chatId) {
            if (unsubMessages) unsubMessages();
            const box = document.getElementById('box');
            box.innerHTML = ""; 

            const q = query(collection(db, "chats", chatId, "messages"), orderBy("time", "asc"));
            unsubMessages = onSnapshot(q, (snap) => {
                box.innerHTML = ""; 
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.sender === currentUser?.uid;
                    const time = m.time ? new Date(m.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    box.innerHTML += `
                        <div class="msg ${isMe ? 'me' : 'others'}">
                            <div class="msg-text">${m.text}</div>
                            <div class="msg-info">${time}</div>
                        </div>`;
                });
                box.scrollTo(0, box.scrollHeight);
            });
        }

        window.toggleMenu = () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('visible');
        };

        window.logout = () => {
            if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
            signOut(auth);
        };

        window.toggleTheme = () => document.body.classList.toggle('dark');
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
    </script>
    <style>
        :root { --bg: #ffffff; --header: #ffffff; --text: #000; --accent: #007aff; --msg-me: #007aff; --msg-other: #f2f2f7; --border: #e5e5ea; --sidebar: #f9f9f9; }
        body.dark { --bg: #000; --header: #121212; --text: #fff; --accent: #0a84ff; --msg-me: #0a84ff; --msg-other: #1c1c1e; --border: #333; --sidebar: #121212; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100dvh; background: var(--sidebar); z-index: 1000; transition: 0.3s ease; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        #sidebar.open { left: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
        #overlay.visible { display: block; }

        .profile-section { padding: 15px; background: var(--msg-other); border-radius: 15px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        #my-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .nickname-input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; text-align: center; outline: none; }

        .user-item { display: flex; align-items: center; gap: 10px; padding: 12px; cursor: pointer; border-radius: 10px; }
        .user-item:active { background: var(--msg-other); }
        .user-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }

        #chat-ui { display: none; flex-direction: column; height: 100dvh; width: 100vw; }
        header { height: 65px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); background: var(--header); gap: 15px; }
        
        #box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; position: relative; }
        .me { align-self: flex-end; background: var(--msg-me); color: #fff; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        .msg-info { font-size: 9px; opacity: 0.5; margin-top: 4px; text-align: right; }

        .input-area { padding: 10px 15px 35px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg); }
        input[type="text"] { flex-grow: 1; padding: 12px 16px; border-radius: 20px; border: none; background: var(--msg-other); color: var(--text); font-size: 16px; outline: none; }
        
        .btn { background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; }
        #auth-ui { height: 100dvh; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px; }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleMenu()"></div>
    <div id="sidebar">
        <div class="profile-section">
            <img id="my-avatar" src="" alt="">
            <input type="text" id="profile-name-input" class="nickname-input" placeholder="Tvoje přezdívka">
            <button class="btn" onclick="updateNickname()" style="font-size: 12px;">Uložit přezdívku</button>
        </div>
        
        <div style="flex-grow: 1; overflow-y: auto;">
            <p style="font-size: 11px; opacity: 0.5; margin-bottom: 10px; letter-spacing: 1px;">KONTAKTY</p>
            <div id="user-list"></div>
        </div>

        <div style="border-top: 1px solid var(--border); padding-top: 15px; display: flex; flex-direction: column; gap: 12px;">
            <button class="btn" style="text-align:left" onclick="toggleTheme()">Vzhled</button>
            <button class="btn" style="text-align:left; color:#ff3b30" onclick="logout()">Odhlásit se</button>
        </div>
    </div>

    <div id="auth-ui">
        <h1 style="margin-bottom: 10px;">Luvyx Chat</h1>
        <button class="btn" style="font-size:18px; border: 1.5px solid var(--accent); padding: 12px 25px; border-radius: 30px;" onclick="login()">Vstoupit</button>
    </div>

    <div id="chat-ui">
        <header>
            <button class="btn" style="font-size:22px" onclick="toggleMenu()">☰</button>
            <div style="display: flex; flex-direction: column;">
                <span style="font-weight: 800; font-size: 18px;">Luvyx Chat</span>
                <span id="chat-subtitle" style="font-size: 11px; opacity: 0.6;">Vyberte kontakt v menu</span>
            </div>
        </header>
        <div id="box"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Napište zprávu..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="btn" onclick="sendMsg()">Odeslat</button>
        </div>
    </div>
</body>
</html>
