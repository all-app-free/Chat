<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luvyx Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
            authDomain: "luvyxchat.firebaseapp.com",
            projectId: "luvyxchat",
            storageBucket: "luvyxchat.firebasestorage.app",
            messagingSenderId: "311815294233",
            appId: "1:311815294233:web:4d6cb198ba2d1068314988",
            measurementId: "G-Z17TLX3PP0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                setDoc(doc(db, "users", user.uid), { 
                    name: user.displayName || user.phoneNumber, 
                    photo: user.photoURL,
                    typing: false 
                }, { merge: true });
                loadMessages();
                loadUsers();
            } else {
                document.getElementById('auth-ui').style.display = 'flex';
                document.getElementById('chat-ui').style.display = 'none';
            }
        });

        // Ovládání menu
        window.toggleMenu = () => document.getElementById('sidebar').classList.toggle('open');
        window.toggleTheme = () => document.body.classList.toggle('dark');
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if (currentUser && input.value.trim() !== "") {
                await addDoc(collection(db, "messages"), {
                    text: input.value,
                    uid: currentUser.uid,
                    name: currentUser.displayName || currentUser.phoneNumber,
                    time: serverTimestamp(),
                    read: false
                });
                input.value = "";
                stopTyping();
            }
        };

        let typingTimeout;
        window.handleTyping = () => {
            if (!currentUser) return;
            updateDoc(doc(db, "users", currentUser.uid), { typing: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(stopTyping, 3000);
        };
        const stopTyping = () => {
            if (currentUser) updateDoc(doc(db, "users", currentUser.uid), { typing: false });
        };

        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const userList = document.getElementById('user-list');
                userList.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    userList.innerHTML += `
                        <div class="user-item">
                            <img src="${u.photo || 'https://via.placeholder.com/40'}" class="user-img">
                            <span>${u.name}</span>
                        </div>`;
                });
            });
        }

        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.uid === currentUser?.uid;
                    if (!isMe && !m.read) updateDoc(doc(db, "messages", d.id), { read: true });
                    const time = m.time ? new Date(m.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    box.innerHTML += `
                        <div class="msg ${isMe ? 'me' : 'others'}">
                            <div class="msg-info">${m.name} • ${time}</div>
                            <div class="msg-text">${m.text}</div>
                            ${isMe ? `<div class="status">${m.read ? 'Přečteno' : 'Odesláno'}</div>` : ''}
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
    <style>
        :root { --bg: #ffffff; --header: #ffffff; --text: #1a1a1a; --accent: #007aff; --msg-me: #007aff; --msg-other: #f2f2f7; --border: #e5e5ea; --sidebar: #f8f9fa; }
        body.dark { --bg: #000000; --header: #1c1c1e; --text: #ffffff; --accent: #0a84ff; --msg-me: #0a84ff; --msg-other: #2c2c2e; --border: #38383a; --sidebar: #1c1c1e; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Sidebar Menu */
        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--sidebar); z-index: 100; transition: 0.3s; padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        .sidebar-header { font-weight: bold; margin-bottom: 20px; font-size: 20px; }
        #user-list { flex-grow: 1; overflow-y: auto; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .user-img { width: 35px; height: 35px; border-radius: 50%; background: #ccc; }

        /* Main Chat Area */
        #chat-ui { display: none; flex-direction: column; height: 100%; width: 100%; }
        header { height: 60px; background: var(--header); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); gap: 15px; }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--accent); background: none; border: none; }

        #box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; position: relative; font-size: 16px; }
        .me { align-self: flex-end; background: var(--msg-me); color: #fff; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        .status { font-size: 10px; text-align: right; opacity: 0.8; margin-top: 4px; }

        .input-area { padding: 10px 15px 30px 15px; display: flex; gap: 10px; background: var(--bg); border-top: 1px solid var(--border); }
        input[type="text"] { flex-grow: 1; padding: 12px 18px; border-radius: 25px; border: none; background: var(--msg-other); color: var(--text); outline: none; font-size: 16px; }
        
        .action-btn { background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; }
        #auth-ui { height: 100%; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">Luvyx Chat</div>
        <div id="user-list">
            </div>
        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
            <button class="action-btn" onclick="toggleTheme()">Přepnout režim</button>
            <button class="action-btn" style="color: #ff3b30;" onclick="logout()">Odhlásit se</button>
            <button class="action-btn" onclick="toggleMenu()">Zavřít menu</button>
        </div>
    </div>

    <div id="auth-ui">
        <button class="action-btn" style="font-size: 20px;" onclick="login()">Vstoupit do Chatu</button>
    </div>

    <div id="chat-ui">
        <header>
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <span style="font-weight: 700;">Luvyx Chat</span>
        </header>
        
        <div id="box"></div>
        <div id="typing-status" style="height:20px; padding: 0 15px; font-size: 12px; color: var(--accent);"></div>
        
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Zpráva..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="action-btn" style="font-size: 16px;" onclick="sendMsg()">Odeslat</button>
        </div>
    </div>

</body>
</html>
