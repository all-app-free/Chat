<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvyx Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
            authDomain: "luvyxchat.firebaseapp.com",
            projectId: "luvyxchat",
            storageBucket: "luvyxchat.firebasestorage.app",
            messagingSenderId: "311815294233",
            appId: "1:311815294233:web:4d6cb198ba2d1068314988",
            measurementId: "G-Z17TLX3PP0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- STAV PŘIHLÁŠENÍ ---
        onAuthStateChanged(auth, (user) => {
            const authDiv = document.getElementById('auth-ui');
            const chatDiv = document.getElementById('chat-ui');
            if (user) {
                authDiv.style.display = 'none';
                chatDiv.style.display = 'flex';
                loadMessages();
            } else {
                authDiv.style.display = 'flex';
                chatDiv.style.display = 'none';
            }
        });

        // --- PŘEPÍNAČ REŽIMU ---
        window.toggleTheme = () => {
            document.body.classList.toggle('dark');
            const btn = document.getElementById('themeBtn');
            btn.innerText = document.body.classList.contains('dark') ? '☀️' : '🌙';
        };

        // --- PŘIHLÁŠENÍ ---
        window.loginGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
        
        window.sendSMS = async () => {
            const phone = document.getElementById('phoneInput').value;
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
            document.getElementById('phone-step-1').style.display = 'none';
            document.getElementById('phone-step-2').style.display = 'block';
        };

        window.verifyCode = async () => {
            const code = document.getElementById('codeInput').value;
            await window.confirmationResult.confirm(code);
        };

        window.logout = () => signOut(auth);

        // --- CHAT LOGIKA ---
        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            const user = auth.currentUser;
            if (user && input.value.trim() !== "") {
                await addDoc(collection(db, "messages"), {
                    text: input.value,
                    uid: user.uid,
                    name: user.displayName || user.phoneNumber,
                    time: serverTimestamp()
                });
                input.value = "";
            }
        };

        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('box');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isMe = m.uid === auth.currentUser?.uid;
                    box.innerHTML += `
                        <div class="msg ${isMe ? 'me' : 'others'}">
                            <div class="name">${m.name}</div>
                            <div>${m.text}</div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
    <style>
        :root { --bg: #f0f2f5; --panel: #ffffff; --text: #050505; --accent: #0084ff; --msg-other: #e4e6eb; }
        body.dark { --bg: #18191a; --panel: #242526; --text: #e4e6eb; --accent: #0078ff; --msg-other: #3a3b3c; }

        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; transition: 0.3s; }
        
        #auth-ui { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        
        #chat-ui { display: none; flex-direction: column; height: 100vh; max-width: 500px; margin: auto; background: var(--panel); border-left: 1px solid rgba(0,0,0,0.1); border-right: 1px solid rgba(0,0,0,0.1); }
        header { padding: 15px; background: var(--accent); color: white; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        
        #box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 15px; position: relative; }
        .name { font-size: 10px; font-weight: bold; margin-bottom: 3px; opacity: 0.8; }
        .me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }

        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid rgba(0,0,0,0.1); }
        input { flex-grow: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; background: var(--bg); color: var(--text); outline: none; }
        button { border: none; background: var(--accent); color: white; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .btn-google { background: #ea4335; margin-bottom: 10px; width: 100%; }
        .btn-sec { background: rgba(255,255,255,0.2); width: auto; font-size: 18px; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <div class="auth-card">
            <h1>Luvyx Chat</h1>
            <button class="btn-google" onclick="loginGoogle()">Google Login</button>
            <div id="phone-step-1">
                <input type="text" id="phoneInput" placeholder="+420 123 456 789">
                <button style="width:100%" onclick="sendSMS()">Poslat SMS</button>
            </div>
            <div id="phone-step-2" style="display:none;">
                <input type="text" id="codeInput" placeholder="Kód z SMS">
                <button style="width:100%" onclick="verifyCode()">Vstoupit</button>
            </div>
            <div id="recaptcha-container"></div>
        </div>
    </div>

    <div id="chat-ui">
        <header>
            <button class="btn-sec" id="themeBtn" onclick="toggleTheme()">🌙</button>
            Luvyx Chat
            <button class="btn-sec" onclick="logout()">🚪</button>
        </header>
        <div id="box"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Napiš zprávu..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>

</body>
</html>
