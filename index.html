<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvyx Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
            authDomain: "luvyxchat.firebaseapp.com",
            projectId: "luvyxchat",
            storageBucket: "luvyxchat.firebasestorage.app",
            messagingSenderId: "311815294233",
            appId: "1:311815294233:web:4d6cb198ba2d1068314988",
            measurementId: "G-Z17TLX3PP0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let user = null;

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (u) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                // Uložit uživatele do seznamu online
                setDoc(doc(db, "users", u.uid), { name: u.displayName || u.phoneNumber, photo: u.photoURL, lastSeen: serverTimestamp() });
                loadMessages();
            } else {
                document.getElementById('auth-ui').style.display = 'flex';
                document.getElementById('chat-ui').style.display = 'none';
            }
        });

        // TÉMA
        window.toggleTheme = () => document.body.classList.toggle('dark');

        // ODESÍLÁNÍ TEXTU A FOTEK
        window.sendMsg = async (imageUrl = null) => {
            const input = document.getElementById('msgInput');
            if (user && (input.value.trim() !== "" || imageUrl)) {
                await addDoc(collection(db, "messages"), {
                    text: input.value,
                    image: imageUrl,
                    uid: user.uid,
                    name: user.displayName || user.phoneNumber,
                    time: serverTimestamp(),
                    read: false
                });
                input.value = "";
                stopTyping();
            }
        };

        window.uploadFile = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const sRef = ref(storage, `chat/${Date.now()}_${file.name}`);
            await uploadBytes(sRef, file);
            const url = await getDownloadURL(sRef);
            sendMsg(url);
        };

        // INDIKÁTOR PSANÍ
        window.startTyping = () => {
            updateDoc(doc(db, "users", user.uid), { typing: true });
            setTimeout(stopTyping, 3000);
        };
        const stopTyping = () => updateDoc(doc(db, "users", user.uid), { typing: false });

        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.uid === user.uid;
                    if (!isMe && !m.read) updateDoc(doc(db, "messages", d.id), { read: true });
                    
                    const t = m.time ? new Date(m.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
                    
                    box.innerHTML += `
                        <div class="msg ${isMe ? 'me' : 'others'}">
                            <div class="name">${m.name} <span style="font-size:9px;opacity:0.6">${t}</span></div>
                            ${m.image ? `<img src="${m.image}" style="max-width:200px;border-radius:10px;display:block;margin-bottom:5px;">` : ''}
                            <div>${m.text}</div>
                            ${isMe ? `<div class="status">${m.read ? '✔✔' : '✔'}</div>` : ''}
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // Sledování kdo píše
            onSnapshot(collection(db, "users"), (snap) => {
                const typingNames = [];
                snap.forEach(d => { if(d.data().typing && d.id !== user.uid) typingNames.push(d.data().name); });
                document.getElementById('typing').innerText = typingNames.length > 0 ? typingNames.join(', ') + " píše..." : "";
            });
        }

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);
    </script>
    <style>
        :root { --bg: #f0f2f5; --panel: #ffffff; --text: #050505; --accent: #0084ff; --msg-other: #e4e6eb; }
        body.dark { --bg: #18191a; --panel: #242526; --text: #e4e6eb; --accent: #0078ff; --msg-other: #3a3b3c; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; }
        #chat-ui { display: none; flex-direction: column; height: 100vh; max-width: 600px; margin: auto; background: var(--panel); box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        header { padding: 15px; background: var(--accent); color: white; display: flex; justify-content: space-between; align-items: center; }
        #box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 15px; position: relative; }
        .me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        .name { font-size: 10px; font-weight: bold; margin-bottom: 3px; }
        .status { font-size: 10px; text-align: right; }
        .input-area { padding: 15px; border-top: 1px solid rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex-grow: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; background: var(--bg); color: var(--text); outline: none; }
        #typing { font-size: 12px; color: var(--accent); height: 15px; margin-bottom: 5px; margin-left: 15px; }
        #auth-ui { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .btn { border: none; background: var(--accent); color: white; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="auth-ui">
        <button class="btn" onclick="login()">Vstoupit do Luvyx Chat</button>
    </div>
    <div id="chat-ui">
        <header>
            <button class="btn" onclick="toggleTheme()">☀️/🌙</button>
            <strong>Luvyx Chat</strong>
            <button class="btn" onclick="logout()">🚪</button>
        </header>
        <div id="box"></div>
        <div id="typing"></div>
        <div class="input-area">
            <div class="controls">
                <label class="btn">📷<input type="file" hidden accept="image/*" onchange="uploadFile(event)"></label>
                <input type="text" id="msgInput" placeholder="Napiš zprávu..." onkeypress="startTyping(); if(event.key==='Enter') sendMsg()">
                <button class="btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>
</body>
</html>
