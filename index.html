<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luvyx Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
            authDomain: "luvyxchat.firebaseapp.com",
            projectId: "luvyxchat",
            storageBucket: "luvyxchat.firebasestorage.app",
            messagingSenderId: "311815294233",
            appId: "1:311815294233:web:4d6cb198ba2d1068314988",
            measurementId: "G-Z17TLX3PP0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                setDoc(doc(db, "users", user.uid), { 
                    name: user.displayName || user.phoneNumber, 
                    photo: user.photoURL,
                    typing: false 
                }, { merge: true });
                loadMessages();
                loadUsers();
            } else {
                document.getElementById('auth-ui').style.display = 'flex';
                document.getElementById('chat-ui').style.display = 'none';
            }
        });

        window.toggleMenu = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('visible');
        };

        window.toggleTheme = () => document.body.classList.toggle('dark');
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if (currentUser && input.value.trim() !== "") {
                await addDoc(collection(db, "messages"), {
                    text: input.value,
                    uid: currentUser.uid,
                    name: currentUser.displayName || currentUser.phoneNumber,
                    time: serverTimestamp(),
                    read: false
                });
                input.value = "";
                if(currentUser) updateDoc(doc(db, "users", currentUser.uid), { typing: false });
            }
        };

        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    list.innerHTML += `<div class="user-item">
                        <img src="${u.photo || 'https://via.placeholder.com/40'}" class="user-img">
                        <span>${u.name}</span>
                    </div>`;
                });
            });
        }

        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.uid === currentUser?.uid;
                    if (!isMe && !m.read) updateDoc(doc(db, "messages", d.id), { read: true });
                    const time = m.time ? new Date(m.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    box.innerHTML += `<div class="msg ${isMe ? 'me' : 'others'}">
                        <div class="msg-info">${m.name} • ${time}</div>
                        <div class="msg-text">${m.text}</div>
                        ${isMe ? `<div class="status">${m.read ? 'Přečteno' : 'Odesláno'}</div>` : ''}
                    </div>`;
                });
                box.scrollTo(0, box.scrollHeight);
            });
        }
    </script>
    <style>
        :root { --bg: #ffffff; --header: #ffffff; --text: #000; --accent: #007aff; --msg-me: #007aff; --msg-other: #f2f2f7; --border: #e5e5ea; --sidebar: #f9f9f9; }
        body.dark { --bg: #000; --header: #121212; --text: #fff; --accent: #0a84ff; --msg-me: #0a84ff; --msg-other: #1c1c1e; --border: #333; --sidebar: #121212; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Sidebar & Overlay */
        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100dvh; background: var(--sidebar); z-index: 1000; transition: transform 0.3s ease; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        #sidebar.open { transform: translateX(280px); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
        #overlay.visible { display: block; }

        .sidebar-header { font-weight: bold; font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .user-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
        .user-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        /* Layout */
        #chat-ui { display: none; flex-direction: column; height: 100dvh; width: 100vw; }
        header { height: 60px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); gap: 15px; background: var(--header); }
        
        #box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 16px; line-height: 1.4; }
        .me { align-self: flex-end; background: var(--msg-me); color: #fff; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; margin-bottom: 3px; opacity: 0.7; }
        .status { font-size: 9px; text-align: right; margin-top: 2px; }

        /* Input Area */
        .input-area { padding: 10px 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg); padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        input[type="text"] { flex-grow: 1; padding: 12px 16px; border-radius: 20px; border: none; background: var(--msg-other); color: var(--text); font-size: 16px; outline: none; }
        
        .btn { background: none; border: none; color: var(--accent); font-weight: 600; font-size: 15px; cursor: pointer; }
        #auth-ui { height: 100dvh; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleMenu()"></div>
    <div id="sidebar">
        <div class="sidebar-header">Menu</div>
        <div id="user-list" style="flex-grow: 1; overflow-y: auto;"></div>
        <div style="border-top: 1px solid var(--border); padding-top: 15px; display: flex; flex-direction: column; gap: 15px;">
            <button class="btn" style="text-align: left;" onclick="toggleTheme()">Přepnout režim</button>
            <button class="btn" style="text-align: left; color: #ff3b30;" onclick="logout()">Odhlásit se</button>
            <button class="btn" onclick="toggleMenu()">Zavřít</button>
        </div>
    </div>

    <div id="auth-ui">
        <button class="btn" style="font-size: 20px;" onclick="login()">Přihlásit se přes Google</button>
    </div>

    <div id="chat-ui">
        <header>
            <button class="btn" style="font-size: 22px;" onclick="toggleMenu()">Menu</button>
            <span style="font-weight: bold; flex-grow: 1;">Luvyx Chat</span>
        </header>
        <div id="box"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Zpráva..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="btn" onclick="sendMsg()">Odeslat</button>
        </div>
    </div>
</body>
</html>
