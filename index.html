<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvyx Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
            authDomain: "luvyxchat.firebaseapp.com",
            projectId: "luvyxchat",
            storageBucket: "luvyxchat.firebasestorage.app",
            messagingSenderId: "311815294233",
            appId: "1:311815294233:web:4d6cb198ba2d1068314988",
            measurementId: "G-Z17TLX3PP0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Přihlášení přes Google
        window.login = async () => {
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'block';
        };

        // Odeslání zprávy
        window.sendMsg = async () => {
            const text = document.getElementById('msgInput').value;
            const user = auth.currentUser;
            if (user && text) {
                await addDoc(collection(db, "messages"), {
                    text: text,
                    uid: user.uid,
                    name: user.displayName,
                    time: serverTimestamp(),
                    status: 'sent'
                });
                document.getElementById('msgInput').value = "";
            }
        };

        // Načítání zpráv v reálném čase
        const q = query(collection(db, "messages"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('box');
            box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const align = m.uid === auth.currentUser?.uid ? 'right' : 'left';
                box.innerHTML += `<div style="text-align:${align}; margin-bottom:10px;">
                    <small>${m.name}</small><br>
                    <span style="background:#eee; padding:5px; border-radius:5px;">${m.text}</span>
                    <small>${m.status === 'read' ? '✔✔' : '✔'}</small>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; }
        #box { flex-grow: 1; border: 1px solid #ddd; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="auth-ui">
        <button onclick="login()">Přihlásit se přes Google</button>
    </div>
    <div id="chat-ui" style="display:none;">
        <div id="box"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="msgInput" style="flex-grow:1" placeholder="Napiš zprávu...">
            <button onclick="sendMsg()">Odeslat</button>
        </div>
    </div>
</body>
</html>
