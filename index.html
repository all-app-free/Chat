<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luvyx Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
            authDomain: "luvyxchat.firebaseapp.com",
            projectId: "luvyxchat",
            storageBucket: "luvyxchat.firebasestorage.app",
            messagingSenderId: "311815294233",
            appId: "1:311815294233:web:4d6cb198ba2d1068314988",
            measurementId: "G-Z17TLX3PP0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                setDoc(doc(db, "users", user.uid), { 
                    name: user.displayName || user.phoneNumber, 
                    typing: false 
                }, { merge: true });
                loadMessages();
            } else {
                document.getElementById('auth-ui').style.display = 'flex';
                document.getElementById('chat-ui').style.display = 'none';
            }
        });

        window.toggleTheme = () => {
            const isDark = document.body.classList.toggle('dark');
            document.getElementById('themeBtn').innerText = isDark ? 'Světlý režim' : 'Tmavý režim';
        };

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if (currentUser && input.value.trim() !== "") {
                await addDoc(collection(db, "messages"), {
                    text: input.value,
                    uid: currentUser.uid,
                    name: currentUser.displayName || currentUser.phoneNumber,
                    time: serverTimestamp(),
                    read: false
                });
                input.value = "";
                stopTyping();
            }
        };

        let typingTimeout;
        window.handleTyping = () => {
            if (!currentUser) return;
            updateDoc(doc(db, "users", currentUser.uid), { typing: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(stopTyping, 3000);
        };
        const stopTyping = () => {
            if (currentUser) updateDoc(doc(db, "users", currentUser.uid), { typing: false });
        };

        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.uid === currentUser?.uid;
                    if (!isMe && !m.read) updateDoc(doc(db, "messages", d.id), { read: true });
                    const time = m.time ? new Date(m.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    
                    box.innerHTML += `
                        <div class="msg ${isMe ? 'me' : 'others'}">
                            <div class="msg-info">${m.name} • ${time}</div>
                            <div class="msg-text">${m.text}</div>
                            ${isMe ? `<div class="status">${m.read ? 'Přečteno' : 'Odesláno'}</div>` : ''}
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            onSnapshot(collection(db, "users"), (snap) => {
                const typingList = [];
                snap.forEach(d => {
                    if (d.data().typing && d.id !== currentUser?.uid) typingList.push(d.data().name);
                });
                document.getElementById('typing-status').innerText = typingList.length > 0 ? typingList.join(', ') + " píše..." : "";
            });
        }
    </script>
    <style>
        :root { --bg: #ffffff; --header: #f8f9fa; --text: #1a1a1a; --accent: #007aff; --msg-me: #007aff; --msg-other: #f2f2f7; --border: #e5e5ea; }
        body.dark { --bg: #000000; --header: #1c1c1e; --text: #ffffff; --accent: #0a84ff; --msg-me: #0a84ff; --msg-other: #2c2c2e; --border: #38383a; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #auth-ui { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #chat-ui { display: none; flex-direction: column; height: 100%; width: 100%; }

        header { height: 60px; background: var(--header); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); }
        header span { font-weight: 700; font-size: 18px; }

        #box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; position: relative; font-size: 16px; }
        .me { align-self: flex-end; background: var(--msg-me); color: #fff; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        
        .msg-info { font-size: 11px; margin-bottom: 3px; opacity: 0.7; font-weight: 500; }
        .status { font-size: 10px; text-align: right; margin-top: 4px; opacity: 0.8; font-weight: 600; }

        #typing-status { height: 20px; padding: 0 15px; font-size: 12px; color: var(--accent); }

        .input-area { padding: 10px 15px 30px 15px; display: flex; gap: 10px; background: var(--bg); border-top: 1px solid var(--border); }
        input[type="text"] { flex-grow: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid var(--border); background: var(--msg-other); color: var(--text); outline: none; font-size: 16px; }
        
        .text-btn { background: none; border: none; color: var(--accent); font-weight: 600; font-size: 14px; cursor: pointer; padding: 5px; }
        .send-btn { font-size: 16px; padding: 0 10px; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <h1 style="margin-bottom: 30px;">Luvyx Chat</h1>
        <button class="text-btn" style="font-size: 18px;" onclick="login()">Přihlásit se přes Google</button>
    </div>

    <div id="chat-ui">
        <header>
            <button class="text-btn" id="themeBtn" onclick="toggleTheme()">Tmavý režim</button>
            <span>Luvyx Chat</span>
            <button class="text-btn" onclick="logout()">Odhlásit se</button>
        </header>
        
        <div id="box"></div>
        <div id="typing-status"></div>
        
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Zpráva..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="text-btn send-btn" onclick="sendMsg()">Odeslat</button>
        </div>
    </div>

</body>
</html>
