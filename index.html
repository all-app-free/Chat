<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvyx Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
            authDomain: "luvyxchat.firebaseapp.com",
            projectId: "luvyxchat",
            storageBucket: "luvyxchat.firebasestorage.app",
            messagingSenderId: "311815294233",
            appId: "1:311815294233:web:4d6cb198ba2d1068314988",
            measurementId: "G-Z17TLX3PP0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const messaging = getMessaging(app);

        let currentUser = null;

        // --- STAV PŘIHLÁŠENÍ ---
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                setDoc(doc(db, "users", user.uid), { 
                    name: user.displayName || user.phoneNumber, 
                    typing: false 
                }, { merge: true });
                loadMessages();
            } else {
                document.getElementById('auth-ui').style.display = 'flex';
                document.getElementById('chat-ui').style.display = 'none';
            }
        });

        // --- NOTIFIKACE ---
        window.requestNotifications = async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const token = await getToken(messaging, { 
                        vapidKey: '8Zi9JNrBKyjaRbnAHzlnKXveB0le-P2KDSbOOOAdwV4' // <--- SEM VLOŽ SVŮJ KLÍČ
                    });
                    console.log("Token:", token);
                    alert("Oznámení zapnuta!");
                }
            } catch (err) { console.error(err); }
        };

        // --- FUNKCE ---
        window.toggleTheme = () => document.body.classList.toggle('dark');
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if (currentUser && input.value.trim() !== "") {
                await addDoc(collection(db, "messages"), {
                    text: input.value,
                    uid: currentUser.uid,
                    name: currentUser.displayName || currentUser.phoneNumber,
                    time: serverTimestamp(),
                    read: false
                });
                input.value = "";
                stopTyping();
            }
        };

        let typingTimeout;
        window.handleTyping = () => {
            if (!currentUser) return;
            updateDoc(doc(db, "users", currentUser.uid), { typing: true });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(stopTyping, 3000);
        };
        const stopTyping = () => {
            if (currentUser) updateDoc(doc(db, "users", currentUser.uid), { typing: false });
        };

        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("time", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.uid === currentUser?.uid;
                    if (!isMe && !m.read) updateDoc(doc(db, "messages", d.id), { read: true });
                    const time = m.time ? new Date(m.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    
                    box.innerHTML += `
                        <div class="msg ${isMe ? 'me' : 'others'}">
                            <div class="msg-info">${m.name} • ${time}</div>
                            <div class="msg-text">${m.text}</div>
                            ${isMe ? `<div class="status">${m.read ? '✔✔' : '✔'}</div>` : ''}
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            onSnapshot(collection(db, "users"), (snap) => {
                const typingList = [];
                snap.forEach(d => {
                    if (d.data().typing && d.id !== currentUser?.uid) typingList.push(d.data().name);
                });
                document.getElementById('typing-status').innerText = typingList.length > 0 ? typingList.join(', ') + " píše..." : "";
            });
        }
    </script>
    <style>
        :root { --bg: #f4f7f6; --panel: #ffffff; --text: #1c1e21; --accent: #0084ff; --msg-other: #e4e6eb; --shadow: rgba(0,0,0,0.1); }
        body.dark { --bg: #101214; --panel: #1c1e21; --text: #e4e6eb; --accent: #0078ff; --msg-other: #3a3b3c; --shadow: rgba(0,0,0,0.3); }
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #auth-ui { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px var(--shadow); text-align: center; width: 100%; max-width: 400px; }
        #chat-ui { display: none; flex-direction: column; height: 100vh; max-width: 600px; margin: auto; background: var(--panel); box-shadow: 0 0 40px var(--shadow); }
        header { padding: 15px; background: var(--accent); color: white; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; position: relative; }
        .me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; margin-bottom: 4px; opacity: 0.8; }
        #typing-status { height: 20px; padding: 0 20px; font-size: 12px; color: var(--accent); font-style: italic; }
        .input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid var(--msg-other); }
        input[type="text"] { flex-grow: 1; padding: 12px 20px; border-radius: 25px; border: none; background: var(--bg); color: var(--text); outline: none; }
        .btn { border: none; background: var(--accent); color: white; padding: 10px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-header { background: rgba(255,255,255,0.2); font-size: 12px; }
    </style>
</head>
<body>
    <div id="auth-ui">
        <div class="login-card">
            <h1>Luvyx Chat</h1>
            <button class="btn" style="width:100%" onclick="login()">Přihlásit přes Google</button>
        </div>
    </div>
    <div id="chat-ui">
        <header>
            <button class="btn btn-header" onclick="toggleTheme()">🌓</button>
            <button class="btn btn-header" onclick="requestNotifications()">🔔</button>
            <span>Luvyx Chat</span>
            <button class="btn btn-header" onclick="logout()">🚪</button>
        </header>
        <div id="box"></div>
        <div id="typing-status"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Napiš zprávu..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="btn" onclick="sendMsg()">➤</button>
        </div>
    </div>
</body>
</html>
