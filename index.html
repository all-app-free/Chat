<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvyx Chat</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message { max-width: 70%; margin-bottom: 10px; padding: 10px; border-radius: 10px; font-size: 14px; position: relative; }
        .sent { align-self: flex-end; background: #007aff; color: white; }
        .received { align-self: flex-start; background: #e5e5ea; color: black; }
        .input-area { padding: 10px; display: flex; background: white; border-top: 1px solid #ccc; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button { background: #007aff; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; }
        .user-name { font-size: 10px; margin-bottom: 2px; opacity: 0.7; }
        .btn-login { padding: 15px 30px; font-size: 18px; border-radius: 30px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Luvyx Chat</h1>
        <button class="btn-login" onclick="login()">Přihlášení přes Google</button>
    </div>

    <div id="chat-screen">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Napište zprávu...">
            <button onclick="sendMessage()">Odeslat</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        // TVOJE KONFIGURACE (Doplň své údaje, pokud je máš jiné)
        const firebaseConfig = {
  apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
  authDomain: "luvyxchat.firebaseapp.com",
  projectId: "luvyxchat",
  storageBucket: "luvyxchat.firebasestorage.app",
  messagingSenderId: "311815294233",
  appId: "1:311815294233:web:4d6cb198ba2d1068314988",
  measurementId: "G-Z17TLX3PP0"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let currentUser = null;

        // 1. FUNKCE PRO PŘIHLÁŠENÍ (Redirect je pro APK nutnost)
        window.login = () => {
            const provider = new GoogleAuthProvider();
            signInWithRedirect(auth, provider);
        };

        // 2. ZPRACOVÁNÍ NÁVRATU Z PŘIHLÁŠENÍ (Klíčové pro funkčnost v APK)
        getRedirectResult(auth)
            .then((result) => {
                if (result?.user) {
                    showChat(result.user);
                }
            }).catch((error) => {
                if (error.code !== 'auth/redirect-cancelled-by-user') {
                    alert("Chyba přihlášení: " + error.message);
                }
            });

        // Sledování stavu uživatele
        onAuthStateChanged(auth, (user) => {
            if (user) {
                showChat(user);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('chat-screen').style.display = 'none';
            }
        });

        function showChat(user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            loadMessages();
        }

        // POSÍLÁNÍ ZPRÁV
        window.sendMessage = () => {
            const text = document.getElementById('msgInput').value;
            if (text.trim() && currentUser) {
                push(ref(db, 'messages'), {
                    text: text,
                    name: currentUser.displayName,
                    uid: currentUser.uid,
                    timestamp: Date.now()
                });
                document.getElementById('msgInput').value = '';
            }
        };

        // NAČÍTÁNÍ ZPRÁV
        function loadMessages() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = ''; // Vyčistit při startu
            onChildAdded(ref(db, 'messages'), (snapshot) => {
                const data = snapshot.val();
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message');
                msgDiv.classList.add(data.uid === currentUser.uid ? 'sent' : 'received');
                
                msgDiv.innerHTML = `
                    <div class="user-name">${data.name}</div>
                    <div>${data.text}</div>
                `;
                messagesDiv.appendChild(msgDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }
    </script>
</body>
</html>
