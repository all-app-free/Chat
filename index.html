<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luvyx Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW9wTUspeZIfVDOrmE11GHsWWZACdaghc",
            authDomain: "luvyxchat.firebaseapp.com",
            projectId: "luvyxchat",
            storageBucket: "luvyxchat.firebasestorage.app",
            messagingSenderId: "311815294233",
            appId: "1:311815294233:web:4d6cb198ba2d1068314988",
            measurementId: "G-Z17TLX3PP0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let activeChatId = null; 
        let unsubMessages = null;
        let isPremium = false;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('chat-ui').style.display = 'flex';
                
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        isPremium = data.premium || false;
                        document.getElementById('profile-name-input').value = data.name || user.displayName;
                        document.getElementById('my-avatar').src = data.photo || user.photoURL;
                        document.getElementById('premium-status').innerText = isPremium ? "👑 Premium Aktivní" : "Zadejte kód pro Premium";
                    } else {
                        setDoc(userRef, { name: user.displayName, photo: user.photoURL, uid: user.uid, premium: false }, { merge: true });
                    }
                });
                loadAllUsers();
            } else {
                currentUser = null;
                document.getElementById('auth-ui').style.display = 'flex';
                document.getElementById('chat-ui').style.display = 'none';
                document.getElementById('box').innerHTML = ""; 
            }
        });

        window.checkPremium = async () => {
            const code = document.getElementById('premium-code').value.trim();
            if (code === "Maty") {
                await updateDoc(doc(db, "users", currentUser.uid), { premium: true });
                document.getElementById('premium-code').value = "";
                alert("Gratulujeme! Máš Luvyx Premium 👑");
            } else {
                alert("Neplatný kód.");
            }
        };

        const getChatId = (uid1, uid2) => [uid1, uid2].sort().join("_");

        function loadAllUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const u = d.data();
                    if(u.uid === currentUser?.uid) return;
                    const div = document.createElement('div');
                    div.className = 'user-circle-item';
                    div.onclick = () => startChat(u);
                    div.innerHTML = `
                        <div class="avatar-wrapper ${u.premium ? 'premium-ring' : ''}">
                            <img src="${u.photo || ''}" alt="">
                        </div>
                        <span class="user-circle-name">${u.name.split(' ')[0]}</span>
                    `;
                    list.appendChild(div);
                });
            });
        }

        window.updateNickname = async () => {
            const newName = document.getElementById('profile-name-input').value.trim();
            if (currentUser && newName !== "") {
                await updateDoc(doc(db, "users", currentUser.uid), { name: newName });
                alert("Přezdívka uložena!");
            }
        };

        window.startChat = (targetUser) => {
            activeChatId = getChatId(currentUser.uid, targetUser.uid);
            document.getElementById('chat-subtitle').innerText = "Chat s: " + targetUser.name;
            toggleMenu();
            loadMessages(activeChatId);
        };

        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if (currentUser && activeChatId && input.value.trim() !== "") {
                await addDoc(collection(db, "chats", activeChatId, "messages"), {
                    text: input.value,
                    sender: currentUser.uid,
                    premium: isPremium,
                    time: serverTimestamp()
                });
                input.value = "";
            }
        };

        function loadMessages(chatId) {
            if (unsubMessages) unsubMessages();
            const box = document.getElementById('box');
            box.innerHTML = ""; 
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("time", "asc"));
            unsubMessages = onSnapshot(q, (snap) => {
                box.innerHTML = ""; 
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.sender === currentUser?.uid;
                    const time = m.time ? new Date(m.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
                    box.innerHTML += `
                        <div class="msg ${isMe ? 'me' : 'others'} ${m.premium ? 'premium-msg' : ''}">
                            <div class="msg-text">${m.text}</div>
                            <div class="msg-info">${time} ${m.premium ? '👑' : ''}</div>
                        </div>`;
                });
                box.scrollTo(0, box.scrollHeight);
            });
        }

        window.toggleMenu = () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('visible');
        };

        window.logout = () => {
            if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
            signOut(auth);
        };

        window.toggleTheme = () => document.body.classList.toggle('dark');
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
    </script>
    <style>
        :root { --bg: #ffffff; --header: #ffffff; --text: #000; --accent: #007aff; --msg-me: #007aff; --msg-other: #f2f2f7; --border: #e5e5ea; --sidebar: #f9f9f9; --gold: #d4af37; }
        body.dark { --bg: #000; --header: #121212; --text: #fff; --accent: #0a84ff; --msg-me: #0a84ff; --msg-other: #1c1c1e; --border: #333; --sidebar: #121212; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* SIDEBAR & OVERLAY */
        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100dvh; background: var(--sidebar); z-index: 1000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        #sidebar.open { left: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; display: none; backdrop-filter: blur(2px); }
        #overlay.visible { display: block; }

        /* USER CIRCLES (STORIES STYLE) */
        #user-list { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 10px; scrollbar-width: none; }
        #user-list::-webkit-scrollbar { display: none; }
        .user-circle-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; cursor: pointer; }
        .avatar-wrapper { width: 50px; height: 50px; border-radius: 50%; padding: 2px; background: var(--border); margin-bottom: 4px; }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .premium-ring { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .user-circle-name { font-size: 10px; font-weight: 500; opacity: 0.8; width: 55px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PROFILE SECTION */
        .profile-section { padding: 15px; background: var(--msg-other); border-radius: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        #my-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .nickname-input { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; text-align: center; outline: none; }

        .premium-box { padding: 15px; background: linear-gradient(135deg, #fff9e6, #fff); border: 1px solid var(--gold); border-radius: 15px; color: #000; font-size: 12px; box-shadow: 0 4px 12px rgba(212,175,55,0.15); }
        body.dark .premium-box { background: linear-gradient(135deg, #1a1600, #121212); color: #fff; }

        /* CHAT UI */
        #chat-ui { display: none; flex-direction: column; height: 100dvh; width: 100vw; }
        header { height: 70px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--header); gap: 15px; }
        
        #box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 20px; position: relative; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .me { align-self: flex-end; background: var(--msg-me); color: #fff; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: var(--msg-other); color: var(--text); border-bottom-left-radius: 4px; }
        .premium-msg { border: 1.5px solid var(--gold); }
        .msg-info { font-size: 10px; opacity: 0.6; margin-top: 5px; text-align: right; }

        /* INPUT AREA */
        .input-area { padding: 15px 20px 35px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--bg); }
        input[type="text"] { flex-grow: 1; padding: 14px 20px; border-radius: 25px; border: none; background: var(--msg-other); color: var(--text); font-size: 16px; outline: none; }
        
        .btn { background: none; border: none; color: var(--accent); font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:active { opacity: 0.6; }

        /* LOGIN UI */
        #auth-ui { height: 100dvh; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 25px; text-align: center; }
        #auth-ui h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; }
    </style>
</head>
<body>
    <div id="overlay" onclick="toggleMenu()"></div>
    <div id="sidebar">
        <div class="profile-section">
            <img id="my-avatar" src="" alt="">
            <input type="text" id="profile-name-input" class="nickname-input" placeholder="Tvoje přezdívka">
            <button class="btn" onclick="updateNickname()" style="font-size: 12px;">Uložit přezdívku</button>
        </div>

        <div style="flex-grow: 0; overflow: hidden;">
            <p style="font-size: 11px; opacity: 0.5; margin-bottom: 8px; font-weight: bold;">KONTAKTY</p>
            <div id="user-list"></div>
        </div>

        <div class="premium-box">
            <p id="premium-status" style="font-weight:bold; margin-bottom:8px;">Zadejte kód pro Premium</p>
            <div style="display:flex; gap:8px;">
                <input type="text" id="premium-code" class="nickname-input" placeholder="Kód...">
                <button class="btn" onclick="checkPremium()">Aktivovat</button>
            </div>
        </div>

        <div style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 15px; display: flex; flex-direction: column; gap: 15px;">
            <button class="btn" style="text-align:left; font-size: 14px;" onclick="toggleTheme()">🌓 Změnit vzhled</button>
            <button class="btn" style="text-align:left; color:#ff3b30; font-size: 14px;" onclick="logout()">🚪 Odhlásit se</button>
        </div>
    </div>

    <div id="auth-ui">
        <h1>Luvyx</h1>
        <button class="btn" style="font-size:18px; background: var(--accent); color: white; padding: 15px 40px; border-radius: 35px; box-shadow: 0 8px 20px rgba(0,122,255,0.3);" onclick="login()">Vstoupit do chatu</button>
    </div>

    <div id="chat-ui">
        <header>
            <button class="btn" style="font-size:26px" onclick="toggleMenu()">☰</button>
            <div style="display: flex; flex-direction: column;">
                <span style="font-weight: 800; font-size: 20px;">Luvyx</span>
                <span id="chat-subtitle" style="font-size: 12px; opacity: 0.6;">Vyberte si chat</span>
            </div>
        </header>
        <div id="box"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Napište zprávu..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="btn" style="font-size: 18px;" onclick="sendMsg()">➤</button>
        </div>
    </div>
</body>
</html>
